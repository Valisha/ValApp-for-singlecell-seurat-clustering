[workspace]
authors = ["Lucas Graybuck <lucasg@alleninstitute.org>"]
channels = ["conda-forge", "https://conda.anaconda.org/bioconda"]
name = "ValApp-for-singlecell-seurat-clustering"
platforms = ["osx-arm64", "linux-aarch64"]
version = "0.1.0"

[tasks]
start = "R -e 'shiny::runApp(\"app.R\", port=3838, host=\"0.0.0.0\")'"

[dependencies]
r-base = ">=4.5.3,<4.6"
r-shiny = ">=1.13.0,<2"
r-seurat = ">=5.4.0,<6"
r-dplyr = ">=1.2.1,<2"
r-ggplot2 = ">=4.0.3,<5"
r-patchwork = ">=1.3.2,<2"
r-circlize = ">=0.4.18,<0.5"
r-openxlsx = ">=4.2.8.1,<5"
r-readxl = ">=1.4.5,<2"
r-dt = ">=0.34.0,<0.35"
r-tibble = ">=3.3.1,<4"
r-scales = ">=1.4.0,<2"
bioconductor-complexheatmap = ">=2.26.1,<3"
